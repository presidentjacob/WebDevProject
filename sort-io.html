<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sort.io Collections</title>
<link rel="stylesheet" href="index-style.css">
<script defer src="sort-io.js"></script>
</head>

<body>

<nav class="navigation">
  <a href="index.html" class="nav-link">Home</a>
  <a href="sort-io.html" class="nav-link">Sort IO</a>
  <a href="lists.html" class="nav-link">Lists</a>
  <a href="profile.html" class="nav-link">Profile</a>
</nav>

<div class="collections-container">
  <h1>Your Collections</h1>
  <div id="collections"></div>
</div>

<script>

// Check if user is signed in
const currentUser = localStorage.getItem("currentUser");

// If not signed in → redirect to index
if (!currentUser) {
    window.location.href = "index.html";
}

// If signed in → show collections
else {
    const collectionsContainer = document.getElementById("collections");

    const collections = JSON.parse(localStorage.getItem(currentUser + "_collections")) || [];

    if (collections.length === 0) {
        collectionsContainer.innerHTML = "<p>No collections yet.</p>";
    } else {
        collections.forEach(collection => {
            const div = document.createElement("div");
            div.className = "collection-card";
            div.textContent = collection;
            collectionsContainer.appendChild(div);
        });
    }
}

</script>

</body>
</html>
